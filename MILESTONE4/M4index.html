<!DOCTYPE html> <!-- HTML5 document -->
<html lang="en"> <!-- English language page -->

<head> <!-- Head section (metadata + imports) -->
    <meta charset="UTF-8"> <!-- Character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobile responsive scaling -->

    <title>TMDB Movie App</title> <!-- Page title -->

    <link rel="stylesheet" href="style.css"> <!-- CSS file -->

    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Mustache template engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/2.3.0/mustache.min.js"></script>
</head>

<body> <!-- Page content starts -->

<header> <!-- Top header section -->
    <h1>TMDB Movie Browser</h1> <!-- Main title -->
</header>

<main class="container"> <!-- Main layout container -->

    <div class="left-column"> <!-- Left side content -->

        <section class="search-section"> <!-- Search bar section -->
            <input type="text" id="searchInput" placeholder="Search movies..."> <!-- Search input box -->
            <button id="searchBtn">Search</button> <!-- Search button -->
            <button id="collectionBtn">Collections</button> <!-- Switch to collections -->
        </section>

        <div id="searchView"> <!-- Search results view -->

            <section class="search-results"> <!-- Search results section -->
                <h2>Search Results</h2> <!-- Title -->

                <div id="controls"></div> <!-- Pagination + view buttons -->

                <div id="resultsGrid"></div> <!-- Movie results grid -->
            </section>

        </div>

        <div id="collectionView" style="display:none;"> <!-- Collections view (hidden by default) -->

            <section class="categories"> <!-- Action category section -->
                <h2>Action Movies</h2> <!-- Action title -->
                <div id="actionMovies" class="category-grid"></div> <!-- Action movies grid -->
            </section>

            <section class="categories"> <!-- Horror category section -->
                <h2>Horror Movies</h2> <!-- Horror title -->
                <div id="horrorMovies" class="category-grid"></div> <!-- Horror movies grid -->
            </section>

        </div>

    </div>

    <div class="right-column"> <!-- Right side panel -->

        <div class="movie-details"> <!-- Movie details container -->
            <h2>Movie Details</h2> <!-- Section title -->

            <div id="movieDetails"> <!-- Selected movie info -->
                <p>Select a movie</p> <!-- Default message -->
            </div>

        </div>

    </div>

</main>

<!-- ===================== TEMPLATES ===================== -->

<!-- Movie card template -->
<script id="movie-template" type="text/template">

    {{#movies}} <!-- Loop through movies -->
    <div class="movie-card" data-id="{{id}}"> <!-- Single movie card -->
        <img src="{{poster}}" alt="{{title}}"> <!-- Movie poster -->
        <p>{{title}}</p> <!-- Movie title -->
    </div>
    {{/movies}}

    {{^movies}} <!-- If no movies found -->
    <p>No movies found.</p> <!-- Empty message -->
    {{/movies}}

</script>

<!-- Movie details template -->
<script id="details-template" type="text/template">

    <img src="{{poster}}" alt="{{title}}"> <!-- Poster image -->
    <h3>{{title}}</h3> <!-- Movie title -->

    <p><b>Release:</b> {{release_date}}</p> <!-- Release date -->
    <p><b>Rating:</b> {{vote_average}}</p> <!-- Rating -->
    <p><b>Language:</b> {{language}}</p> <!-- Language -->

    <p>{{overview}}</p> <!-- Movie description -->

</script>

<!-- Controls template (pagination + view toggle) -->
<script id="controls-template" type="text/template">

    <div class="controls-wrapper">

        <div class="pagination"> 
            {{#pages}}
            <button class="page-btn {{active}}" data-page="{{number}}"> 
                {{number}} 
            </button>
            {{/pages}}
        </div>

        <div class="view-toggle"> <!-- View switch buttons -->
            <button id="gridBtn">Grid</button> 
            <button id="listBtn">List</button> 
        </div>

    </div>

</script>

<script src="movie.js"></script> <!-- JavaScript file -->

</body> <!-- End body -->
</html> <!-- End HTML -->
