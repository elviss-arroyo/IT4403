<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 3 - TMDB AJAX Movie App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>
</head>
<body>

<header>
    <h1>Milestone 33 - TMDB AJAX Movie App</h1>
    <p>Search movies and explore categories — click any movie to view details.</p>
</header>

<main class="container">

    <!-- SEARCH BAR -->
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchBtn">Search</button>
    </div>

    <div class="layout">

        <!-- LEFT COLUMN -->
        <div class="left-column">

            <!-- SEARCH RESULTS -->
            <section class="panel search-results">
                <h2>Search Results</h2>
                <div id="resultsGrid" class="category-grid"></div>
            </section>

            <!-- ACTION MOVIES -->
            <section class="panel categories">
                <h2>Action Movies</h2>
                <div id="actionMovies" class="category-grid"></div>
            </section>

            <!-- HORROR MOVIES -->
            <section class="panel categories">
                <h2>Horror Movies</h2>
                <div id="horrorMovies" class="category-grid"></div>
            </section>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column panel movie-details">
            <h2>Movie Details</h2>
            <div id="movieDetails">
                <p>Select a movie to see details</p>
            </div>
        </div>

    </div>
</main>

<!-- ======= MUSTACHE TEMPLATES ======= -->

<!-- Template: Movie Card -->
<script id="movie-card-template" type="text/template">
    {{#movies}}
    <div class="movie-card" data-id="{{id}}">
        <img src="{{poster}}" alt="{{title}}">
        <div class="movie-info">
            <p class="movie-title">{{title}}</p>
        </div>
    </div>
    {{/movies}}
</script>

<!-- Template: Movie Details Panel -->
<script id="movie-details-template" type="text/template">
    <img src="{{poster}}" alt="{{title}}">
    <h3>{{title}}</h3>
    <p><strong>Release Date:</strong> {{release_date}}</p>
    <p><strong>Rating:</strong> {{vote_average}}</p>
    <p><strong>Overview:</strong> {{overview}}</p>
</script>

<!-- Template: Pagination -->
<script id="pagination-template" type="text/template">
    <div class="pagination">
        {{#pages}}
        <button class="page-btn {{#active}}active{{/active}}" data-page="{{number}}">{{number}}</button>
        {{/pages}}
    </div>
</script>

<script src="movie.js"></script>
</body>
</html>
