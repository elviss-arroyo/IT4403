<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 3 - TMDB AJAX Movie App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Milestone 3 - TMDB AJAX Movie App</h1>
    <p>TMDB Movie Browser</p>
</header>

<main class="container">

    <div class="left-column">

        <!-- SEARCH + COLLECTION BUTTONS -->
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search for a movie...">
            <button id="searchBtn">Search</button>
            <button id="collectionBtn">Movie Collections</button>
        </section>

        <!-- SEARCH VIEW -->
        <div id="searchView">
            <section class="search-results">
                <h2>Search Results</h2>
                <div id="resultsGrid"></div>
            </section>
        </div>

        <!-- COLLECTION VIEW -->
        <div id="collectionView" style="display: none;">

            <section class="categories">
                <h2>Collection of Action Movies</h2>
                <div id="actionMovies" class="category-grid"></div>
            </section>

            <section class="categories">
                <h2>Collection of Horror Movies</h2>
                <div id="horrorMovies" class="category-grid"></div>
            </section>

        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-column">

        <section class="movie-details">
            <h2>Movie Details</h2>

            <div id="movieDetails">
                <p>Select a movie to see details</p>
            </div>
        </section>

    </div>

</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="movie.js"></script>

</body>
</html>
