<!DOCTYPE html> 
<html lang="en"> 

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <title>Milestone 3 - TMDB AJAX Movie App</title> <!--  title -->

    <link rel="stylesheet" href="style.css"> <!-- CSS file -->
</head>

<body>

<header> <!-- Top page -->
    <h1>Milestone 3 - TMDB AJAX Movie App</h1> <!-- heading -->
    <p>TMDB Movie Browser</p> 
</header>

<main class="container"> 


    <div class="left-column"> <!-- Left side -->


        <section class="search-section"> <!-- Search input -->
            <input type="text" id="searchInput" placeholder="Search for a movie..."> <!-- Search input -->
            <button id="searchBtn">Search</button> <!-- Search button -->
        </section>

        <section class="search-results"> <!-- Section for search results -->
            <h2>Search Results</h2> <!-- Section title -->
            <div id="resultsGrid"></div> <!-- Container where search movies appear -->
        </section>


      <section class="categories">
    <div class="tab-container">
        <button class="tab-btn active" data-target="action">Action</button>
        <button class="tab-btn" data-target="horror">Horror</button>
    </div>

    <div id="action-content" class="tab-content active">
        <h2>Action Movies</h2>
        <div id="actionMovies" class="category-grid"></div>
    </div>

    <div id="horror-content" class="tab-content">
        <h2>Horror Movies</h2>
        <div id="horrorMovies" class="category-grid"></div>
    </div>
</section>

    </div>

  
    <div class="right-column"> <!-- Right side  -->

        <section class="movie-details"> <!-- Movie details section -->
            <h2>Movie Details</h2> 

            <div id="movieDetails"> <!--  selected movie info  -->
                <p>Select a movie to see details</p> <!-- Default -->
            </div>

        </section>

    </div>

</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> <!--  jQuery  -->
<script src="movie.js"></script> <!--  js file -->

</body>

</html>
