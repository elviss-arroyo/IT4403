<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 3 - TMDB AJAX Movie App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>
</head>
<body>

<header>
    <h1>Milestone 3 - TMDB AJAX Movie App</h1>
    <p>Search movies and explore categories — click any movie to view details.</p>
</header>

<main class="container">

    <!-- SEARCH BAR -->
    <div class="panel search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for a movie...">
            <button id="searchBtn">Search</button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="layout">

        <!-- LEFT COLUMN -->
        <div class="left-column">

            <!-- TAB BUTTONS -->
            <div class="panel tab-bar">
                <button id="showSearchTab" class="tab-btn active-tab">Search Results</button>
                <button id="showBookshelfTab" class="tab-btn">Bookshelf</button>
            </div>

            <!-- SEARCH TAB -->
            <div id="searchTab">
                <div class="panel">
                    <div class="section-header">
                        <h2>Search Results</h2>
                        <div class="view-toggle">
                            <button id="gridViewBtn" class="toggle-btn active-view">Grid</button>
                            <button id="listViewBtn" class="toggle-btn">List</button>
                        </div>
                    </div>
                    <div id="resultsGrid" class="movie-grid"></div>
                    <div id="pagination"></div>
                </div>
            </div>

            <!-- BOOKSHELF TAB (hidden by default) -->
            <div id="bookshelfTab" style="display:none;">
                <div class="panel">
                    <h2>Action Movies</h2>
                    <div id="actionMovies" class="movie-grid"></div>
                </div>
                <div class="panel">
                    <h2>Horror Movies</h2>
                    <div id="horrorMovies" class="movie-grid"></div>
                </div>
            </div>

        </div>

        <!-- RIGHT COLUMN: DETAILS -->
        <div class="right-column panel">
            <h2>Movie Details</h2>
            <div id="movieDetails">
                <p>Select a movie to see details.</p>
            </div>
        </div>

    </div>
</main>

<!-- ======= MUSTACHE TEMPLATES ======= -->

<!-- Template: Movie Card (grid & list) -->
<script id="movie-card-template" type="text/template">
    {{#movies}}
    <div class="movie-card {{viewClass}}" data-id="{{id}}">
        <img src="{{poster}}" alt="{{title}}">
        <div class="movie-info">
            <p class="movie-title">{{title}}</p>
            {{#showOverview}}
            <p class="movie-overview">{{overview}}</p>
            {{/showOverview}}
        </div>
    </div>
    {{/movies}}
</script>

<!-- Template: Movie Details Panel -->
<script id="movie-details-template" type="text/template">
    <img src="{{poster}}" alt="{{title}}">
    <h3>{{title}}</h3>
    <p><strong>Release Date:</strong> {{release_date}}</p>
    <p><strong>Rating:</strong> {{vote_average}}</p>
    <p><strong>Overview:</strong> {{overview}}</p>
</script>

<!-- Template: Pagination -->
<script id="pagination-template" type="text/template">
    <div class="pagination">
        {{#pages}}
        <button class="page-btn {{#active}}active{{/active}}" data-page="{{number}}">{{number}}</button>
        {{/pages}}
        <span class="page-indicator">Page {{currentPage}}</span>
    </div>
</script>

<script src="movie.js"></script>
</body>
</html>
