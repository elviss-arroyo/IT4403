<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Movie App</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Mustache -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/2.3.0/mustache.min.js"></script>
</head>

<body>

<header>
    <h1>TMDB Movie Browser</h1>
</header>

<main class="container">

    <!-- LEFT SIDE -->
    <div class="left-column">

        <!-- SEARCH BAR -->
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search movies...">
            <button id="searchBtn">Search</button>
            <button id="collectionBtn">Collections</button>
        </section>

        <!-- SEARCH VIEW -->
        <div id="searchView">

            <section class="search-results">
                <h2>Search Results</h2>

                <!-- controls (pagination + view toggle injected here) -->
                <div id="controls"></div>

                <!-- movie results -->
                <div id="resultsGrid"></div>

            </section>
        </div>

        <!-- COLLECTION VIEW -->
        <div id="collectionView" style="display:none;">

            <section class="categories">
                <h2>Action Movies</h2>
                <div id="actionMovies" class="category-grid"></div>
            </section>

            <section class="categories">
                <h2>Horror Movies</h2>
                <div id="horrorMovies" class="category-grid"></div>
            </section>

        </div>

    </div>

    <!-- RIGHT SIDE (DETAILS) -->
    <div class="right-column">

        <div class="movie-details">
            <h2>Movie Details</h2>

            <div id="movieDetails">
                <p>Select a movie</p>
            </div>

        </div>

    </div>

</main>

<!-- ===================== -->
<!-- MUSTACHE TEMPLATES -->
<!-- ===================== -->

<!-- MOVIE CARD TEMPLATE -->
<script id="movie-template" type="text/template">
    {{#movies}}
    <div class="movie-card" data-id="{{id}}">
        <img src="{{poster}}" alt="{{title}}">
        <p>{{title}}</p>
    </div>
    {{/movies}}
</script>

<!-- MOVIE DETAILS TEMPLATE -->
<script id="details-template" type="text/template">
    <img src="{{poster}}" alt="{{title}}">
    <h3>{{title}}</h3>

    <p><b>Release:</b> {{release_date}}</p>
    <p><b>Rating:</b> {{vote_average}}</p>
    <p><b>Language:</b> {{language}}</p>

    <p>{{overview}}</p>
</script>

<!-- OPTIONAL CONTROLS TEMPLATE (if you upgrade later) -->
<script id="controls-template" type="text/template">
    <div class="controls-wrapper">

        <div class="pagination">
            {{#pages}}
                <button class="page-btn {{active}}" data-page="{{number}}">
                    {{number}}
                </button>
            {{/pages}}
        </div>

        <div class="view-toggle">
            <button id="gridBtn">Grid</button>
            <button id="listBtn">List</button>
        </div>

    </div>
</script>

<!-- JS -->
<script src="movie.js"></script>

</body>
</html>
