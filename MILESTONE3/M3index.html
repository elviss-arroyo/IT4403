<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 3 - TMDB AJAX Movie App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Milestone 3 - TMDB AJAX Movie App</h1>
        <p>place</p>
    </header>

    <main class="container">

        <!-- Search -->
        <section class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for a movie..."
                aria-label="Search movie"
            >
            <button id="searchBtn">Search movie by keyword or title</button>
        </section>

        <!-- Results + Details -->
        <section class="content-row">

            <!-- Search Results -->
            <div class="search-results">
                <h2>Search Results</h2>
                <div id="resultsGrid"></div>
            </div>

            <!-- Movie Details -->
            <div class="movie-details">
                <h2>Movie Details</h2>
                <div id="movieDetails"></div>
            </div>

        </section>

        <!-- Categories -->
      <section class="categories">
    <h2>Animation Movies</h2>
    <div id="animationMovies" class="category-grid"></div>

    <h2>Horror Movies</h2>
    <div id="horrorMovies" class="category-grid"></div>
</section>

    </main>

    <script src="script.js"></script>

</body>
</html>
