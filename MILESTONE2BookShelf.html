<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">                                             
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookshelf | Milestone 2
  </title>                           
  <link rel="preconnect" href="https://fonts.googleapis.com">          
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">                      
  <style>                                                               /* Start internal style */
    body { background-color: #f9f9f9; min-height: 100vh; }         
    .grid { 
        display: grid !important;                                       grid-template-columns: repeat(3, 1fr); 
        gap: 20px; 
        max-width: 1100px; 
        margin: 40px auto; 
        padding: 20px;
        position: relative;
        z-index: 10;                                                    } 
    .card { background: white; padding: 20px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; min-height: 400px; } 
    .card img { border: 1px solid #333; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } 
    .card h3 { font-size: 1em; margin: 15px 0 5px 0; height: 2.4em; overflow: hidden; } 
    .card h3 a { color: #333; text-decoration: none; }                   
    .price-tag { font-weight: bold; color: #222; margin: 5px 0; font-size: 0.9em; } 
    .desc { font-size: 0.85em; color: #666; height: 3.6em; overflow: hidden; margin-bottom: 15px; line-height: 1.4; } 
    .error-msg { color: #d93025; background: #fde8e8; padding: 15px; text-align: center; grid-column: 1/-1; border: 1px solid #f5c6cb; } 
  </style>                                                      
</head>

<body>                                           
  <header>                                       
    <a href="MILESTONE2BookSearchPage.html">Home</a>       
    <a href="MILESTONE2BookShelf.html">My Bookshelf</a>          
  </header>                                                      
  <main>                                                         
    <h1 style="text-align: center; margin-top: 40px;">My Bookshelf</h1> 
    <div class="grid" id="resultsGrid">                               
      <p id="loadingMsg" style="grid-column: 1/-1; text-align:center;">Connecting to Google Books API...</p> 
    </div>                                       
      
      
</main>                                         
  <footer>                                                  
    <div class="footer-left">                                  
      Disclaimer: This is a student website created for course projects in IT 4403. 
      <br> Visit the <a href="https://www.kennesaw.edu/ccse/academics/information-technology/" target="_blank">CCSE Website</a>.
    </div>           
    </footer>                         
  <script>                                                              // Start script

    const volumeIds = [
      "8VnJLu3AvvQC", // The Shining
      "pTr44Sx6oWQC", // The Alchemist
      "JVEc0QEACAAJ", // Absolute Batman
      "qhQAywOYz10C", // The Odyssey
      "L-U3AAAACAAJ"  // One Piece
    ];

    const myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";              // API Key

    async function loadShelfByIds() {                                   // Fetch function
      const resultsGrid = document.getElementById('resultsGrid');       // Get grid
      
      try {
        // Fetch all books at once using fetch()
        const responses = await Promise.all(
          volumeIds.map(id => fetch(`https://www.googleapis.com/books/v1/volumes/${id}?key=${myKey}`))
        );

        const books = await Promise.all(responses.map(res => res.json())); // Parse all JSON
        
        resultsGrid.innerHTML = "";                                     // Clear loading text

        books.forEach(book => {                                         // Loop results
          if (!book || book.error) return;                              // Skip errors

          const v = book.volumeInfo;                                    // Info shortcut
          const s = book.saleInfo;                                      // Sale shortcut
          const img = v.imageLinks ? v.imageLinks.smallThumbnail : 'https://via.placeholder.com/120x160'; 
          const secureImg = img.replace("http://", "https://");         // Force HTTPS

          let price = "N/A";                                            // Default price
          if (s && s.saleability === "FOR_SALE" && s.listPrice) {       // Check if available
            price = `$${s.listPrice.amount}`;                           // Format price
          }

        
          const cardHtml = `
            <div class="card">
              <img src="${secureImg}" alt="Book Cover">
              <h3><a href="details.html?id=${book.id}">${v.title || 'Untitled'}</a></h3>
              <p style="font-size:0.85em;"><b>By:</b> ${v.authors ? v.authors.join(', ') : 'N/A'}</p>
              <p style="font-size:0.8em;"><b>Publisher:</b> ${v.publisher || 'N/A'}</p>
              <p class="price-tag">Price: ${price}</p>
              <p class="desc">${(v.description || 'No description available.').substring(0, 90)}...</p>
            </div>
          `;
          
          resultsGrid.insertAdjacentHTML('beforeend', cardHtml);         // Add to grid
        });
      } catch (err) {                                                   // Catch network errors
        resultsGrid.innerHTML = `<p class="error-msg">Error: ${err.message}</p>`;
      }
    }


    document.addEventListener('DOMContentLoaded', loadShelfByIds);      // Trigger fetch
  </script>                                                             </body>
</html>
