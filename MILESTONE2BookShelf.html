<style>

  body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #333; margin: 0; }
  

  header { padding: 20px; display: flex; gap: 20px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
  header a { color: #333; text-decoration: none; }

  /* Search Container - Matches Image 2 */
  .search-container { text-align: center; margin: 60px auto 40px; max-width: 800px; display: flex; justify-content: center; align-items: flex-end; }
  #searchTerm { padding: 10px; width: 60%; border: none; border-bottom: 2px solid #333; background: transparent; font-size: 18px; outline: none; }
  #searchBtn { padding: 12px 30px; background: #333; color: white; border: none; cursor: pointer; font-size: 14px; font-weight: bold; margin-left: 15px; transition: 0.3s; }
  #searchBtn:hover { background: #555; }

  /* Grid Layout - 3 Columns with even spacing */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

  .card { 
    background: white; 
    padding: 25px; 
    text-align: center; 
    border: 1px solid #eee; 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

  /* Consistent Image Sizing */
  .card img { border: 1px solid #333; width: 130px; height: 180px; object-fit: cover; margin-bottom: 20px; }

  /* Font Consistency */
  .card h3 { font-size: 16px; font-weight: 700; margin: 0 0 10px 0; height: 2.4em; overflow: hidden; line-height: 1.2; }
  .card h3 a { color: #333; text-decoration: none; }
  .card .meta-info { font-size: 13px; color: #333; margin-bottom: 8px; }
  .card .price-tag { font-weight: 700; color: #222; margin: 10px 0; font-size: 14px; }
  .card .desc { font-size: 13px; color: #777; line-height: 1.5; height: 4.5em; overflow: hidden; margin-top: auto; }
</style>

<script>
  $(document).ready(function() {
    const volumeIds = ["8VnJLu3AvvQC", "pTr44Sx6oWQC", "JVEc0QEACAAJ", "qhQAywOYz10C", "L-U3AAAACAAJ"];
    const myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";
    const $grid = $("#resultsGrid");

    function loadShelf() {
      $grid.empty();
      
      volumeIds.forEach(id => {
        $.get(`https://www.googleapis.com/books/v1/volumes/${id}?key=${myKey}`, function(book) {
          const v = book.volumeInfo;
          const s = book.saleInfo;
          const img = v.imageLinks ? v.imageLinks.smallThumbnail.replace("http://", "https://") : 'https://via.placeholder.com/130x180';
          
          let price = "Price: N/A";
          if (s && s.listPrice) {
            price = "Price: $" + s.listPrice.amount.toFixed(2);
          }

          const card = $(`
            <div class="card">
              <img src="${img}" alt="Book Cover">
              <h3><a href="details.html?id=${book.id}">${v.title || 'Untitled'}</a></h3>
              <div class="meta-info"><b>By:</b> ${v.authors ? v.authors[0] : 'N/A'}</div>
              <div class="meta-info"><b>Publisher:</b> ${v.publisher || 'N/A'}</div>
              <div class="price-tag">${price}</div>
              <div class="desc">${v.description ? v.description.substring(0, 100) + '...' : 'No description available.'}</div>
            </div>
          `);
          
          $grid.append(card);
        });
      });
    }

    loadShelf();
  });
</script>
