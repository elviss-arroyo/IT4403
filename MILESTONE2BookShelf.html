<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">                                               
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookShelf | Milestone 2
  </title>                            
  <link rel="preconnect" href="https://fonts.googleapis.com">         
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">                         
  <style>                                                            
    .search-container { text-align: center; margin: 40px auto; max-width: 700px; display: flex; justify-content: center; align-items: flex-end; }
    #searchTerm { padding: 12px; width: 70%; border: none; border-bottom: 1px solid #333; background: transparent; font-size: 16px; outline: none; font-family: 'Inter'; } 
    #searchBtn { padding: 10px 25px; background: #333; color: white; border: none; cursor: pointer; font-size: 14px; font-weight: bold; margin-left: 10px; font-family: 'Inter'; } /* Black button */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 20px; } /* 3 column grid */
    .card { background: white; padding: 20px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; } /* Card box */
    .card img { border: 1px solid #333; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } /* Book cover style */
    .card h3 { font-size: 1em; margin: 15px 0 5px 0; height: 2.4em; overflow: hidden; } /* Title style */
    .card h3 a { color: #333; text-decoration: none; }                   /* Title link color */
    .desc { font-size: 0.85em; color: #666; height: 3.6em; overflow: hidden; margin-bottom: 15px; line-height: 1.4; } /* Snippet style */
    #pagination { text-align: center; margin: 40px 0; }                 /* Page buttons area */
    .page-btn { margin: 0 5px; padding: 8px 15px; background: white; border: 1px solid #333; cursor: pointer; } /* Button style */
    .active { background: #333; color: white; }                          /* Current page style */
    .error-msg { color: #d93025; background: #fde8e8; padding: 15px; text-align: center; grid-column: 1/-1; border: 1px solid #f5c6cb; } /* Error style */
  </style>                                                         
  <script src="https://code.jquery.com/jquery-3.7.0.min.js">
    
  </script>   
</head>
  

<body>                         
  <header>                      
    <a href="MILESTONE2BookSearchPage.html">Home</a> 
    <a href="MILESTONE2BookShelf.html">My Bookshelf</a>    
  </header>                                                        
  <main>                                                    
    <h1 style="text-align: center;">My Bookshelf
    </h1>                            
    <div id="pagination">
    
    </div>                
  </main>                                 
  <footer>                                  
    <div class="footer-left">                 
      Disclaimer: This is a student website created for courses. 
      <br> Visit the <a href="https://www.kennesaw.edu/ccse/academics/information-technology/" target="_blank">CCSE Website</a>.
    </div>                      
     
  </footer>                                      
<script>                                                              
  $(document).ready(function() {                                        
    const volumeIds = ["8VnJLu3AvvQC", "pTr44Sx6oWQC", "JVEc0QEACAAJ", "qhQAywOYz10C", "L-U3AAAACAAJ"];
    const myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";              
    const $grid = $("#resultsGrid");

    function loadShelf() {
      // Create an array of AJAX requests
      const requests = volumeIds.map(id => 
        $.get(`https://www.googleapis.com/books/v1/volumes/${id}?key=${myKey}`)
      );

      // Wait for all requests to finish before rendering
      $.when(...requests).done(function(...responses) {
        $grid.empty(); // Clear loading message once

        // jQuery returns different structures based on number of arguments
        const books = volumeIds.length === 1 ? [responses[0]] : responses.map(r => r[0]);

        books.forEach(book => {
          const v = book.volumeInfo;
          const s = book.saleInfo;
          const img = v.imageLinks ? v.imageLinks.smallThumbnail.replace("http://", "https://") : 'https://via.placeholder.com/120x160';
          
          let priceText = "Price: N/A";
          if (s && s.listPrice) {
            priceText = "Price: $" + s.listPrice.amount.toFixed(2);
          }

          const card = $(`
            <div class="card">
              <img src="${img}" alt="Book Cover">
              <h3><a href="details.html?id=${book.id}">${v.title || 'Untitled'}</a></h3>
              <p style="font-size:0.85em; margin: 5px 0;"><b>By:</b> ${v.authors ? v.authors[0] : 'N/A'}</p>
              <p style="font-size:0.85em; margin: 5px 0;"><b>Publisher:</b> ${v.publisher || 'N/A'}</p>
              <p class="price-tag">${priceText}</p>
              <p class="desc">${v.description ? v.description.substring(0, 110) + '...' : 'No description available.'}</p>
            </div>
          `);
          
          $grid.append(card);
        });
      }).fail(function() {
        $grid.html("<p class='error-msg'>Error loading bookshelf. Please refresh.</p>");
      });
    }

    loadShelf();
  });                                                                   
  </script>                                                             
</body>
</html>
