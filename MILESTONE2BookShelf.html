<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">                                              
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>My Bookshelf | Milestone 2
  </title>                         
  <link rel="preconnect" href="https://fonts.googleapis.com">   
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">                 
  <style>                                                              
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 40px auto; padding: 20px; } /* 3 column layout */
    .card { background: white; padding: 20px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; min-height: 400px; } /* Book card box */
    .card img { border: 1px solid #333; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } /* Image style */
    .card h3 { font-size: 1em; margin: 15px 0 5px 0; height: 2.4em; overflow: hidden; } /* Title style */
    .card h3 a { color: #333; text-decoration: none; }                   /* Title link color */
    .price-tag { font-weight: bold; color: #222; margin: 5px 0; font-size: 0.9em; } /* Price style */
    .desc { font-size: 0.85em; color: #666; height: 3.6em; overflow: hidden; margin-bottom: 15px; line-height: 1.4; } /* Snippet style */
    .error-msg { color: #d93025; background: #fde8e8; padding: 15px; text-align: center; grid-column: 1/-1; border: 1px solid #f5c6cb; } /* Error style */
  </style>                                           
</head>

<body>                                              
  <header>                                       
    <a href="MILESTONE2BookSearchPage.html">Home</a>    
    <a href="MILESTONE2BookShelf.html">My Bookshelf</a>  
  </header>                                               
  <main>                                                   
    <h1 style="text-align: center; margin-top: 40px;">My Bookshelf</h1>
    <div class="grid" id="resultsGrid">                              
      <p style="grid-column: 1/-1; text-align:center;">Loading shelf from IDs...</p>
    </div>                                                     
  </main>                                                       
  <footer>                                                       
    <div class="footer-left">                                     
      Disclaimer: This is a student website created for courses. 
      <br> Visit the <a href="https://www.kennesaw.edu/ccse/academics/information-technology/" target="_blank">CCSE Website</a>.
    </div>                                     
</footer>                                      
  <script>                                                              // Start script
    // Array of Volume IDs provided
    const volumeIds = [
      "8VnJLu3AvvQC", // The Shining
      "pTr44Sx6oWQC", // The Alchemist
      "JVEc0QEACAAJ", // Absolute Batman
      "qhQAywOYz10C", // The Odyssey
      "L-U3AAAACAAJ"  // One Piece
    ];

    const myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";              // API Key
    const resultsGrid = document.getElementById('resultsGrid');         // Reference to grid

    async function loadShelfByIds() {                                   // Fetch function
      resultsGrid.innerHTML = "";                                       // Clear loading message
      
      // Use Promise.all to fetch all books simultaneously for better speed
      const bookPromises = volumeIds.map(id => 
        fetch(`https://www.googleapis.com/books/v1/volumes/${id}?key=${myKey}`)
          .then(res => res.ok ? res.json() : null)
      );

      try {
        const books = await Promise.all(bookPromises);                  // Wait for all fetches
        
        books.forEach(book => {                                         // Process each result
          if (!book) return;                                            // Skip failed fetches

          const v = book.volumeInfo;                                    // Metadata shortcut
          const s = book.saleInfo;                                      // Pricing shortcut
          const img = v.imageLinks ? v.imageLinks.smallThumbnail : 'https://via.placeholder.com/120x160'; // Image
          const secureImg = img.replace("http://", "https://");         // Force HTTPS

          let price = "N/A";                                            // Default price
          if (s && s.listPrice) {                                       // Check for price
            price = `$${s.listPrice.amount}`;                           // Format string
          }

          // Create the HTML card
          const cardHtml = `
            <div class="card">
              <img src="${secureImg}" alt="Book Cover">
              <h3><a href="details.html?id=${book.id}">${v.title || 'Untitled'}</a></h3>
              <p style="font-size:0.85em;"><b>By:</b> ${v.authors ? v.authors.join(', ') : 'N/A'}</p>
              <p style="font-size:0.8em;"><b>Publisher:</b> ${v.publisher || 'N/A'}</p>
              <p class="price-tag">Price: ${price}</p>
              <p class="desc">${(v.description || 'No description available.').substring(0, 90)}...</p>
            </div>
          `;
          
          resultsGrid.insertAdjacentHTML('beforeend', cardHtml);         // Add to page
        });
      } catch (error) {                                                 // Global error catch
        resultsGrid.innerHTML = "<p class='error-msg'>Error loading bookshelf. Please check your connection.</p>";
        console.error("Bookshelf Error:", error);                       // Debug info
      }
    }

    // Call the function when the window finishes loading
    window.onload = loadShelfByIds;                                     // Trigger load
  </script>                         
</body>
</html>
