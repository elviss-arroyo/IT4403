<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookshelf | Milestone 2</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

  <style>
    /* Reset and Base - Matches Image 2 Font Consistency */
    body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #333; margin: 0; }
    
    /* Navigation Header */
    header { padding: 30px 50px; display: flex; gap: 30px; }
    header a { 
        color: #333; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 14px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }

    /* Search Section Styling from Image 2 */
    .search-section { text-align: center; margin: 40px auto; }
    .search-section h1 { font-size: 32px; font-weight: 800; margin-bottom: 30px; }
    
    .search-container { 
        display: flex; 
        justify-content: center; 
        align-items: flex-end; 
        max-width: 700px; 
        margin: 0 auto; 
    }
    #searchTerm { 
        padding: 10px; 
        width: 70%; 
        border: none; 
        border-bottom: 2px solid #333; 
        background: transparent; 
        font-size: 18px; 
        outline: none; 
        font-family: 'Inter';
    }
    #searchBtn { 
        padding: 12px 35px; 
        background: #333; 
        color: white; 
        border: none; 
        cursor: pointer; 
        font-size: 14px; 
        font-weight: bold; 
        margin-left: 20px; 
        text-transform: uppercase;
    }

    /* Grid Layout - Fixed Spacing */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 40px; 
        max-width: 1100px; 
        margin: 50px auto; 
        padding: 0 20px; 
    }

    /* Card Styling - Uniform Alignment */
    .card { 
        background: white; 
        padding: 30px; 
        text-align: center; 
        border: 1px solid #eee; 
        display: flex; 
        flex-direction: column; 
        align-items: center;
        min-height: 520px; /* Prevents uneven heights */
    }
    
    /* Image Consistency */
    .card img { 
        border: 1px solid #333; 
        width: 130px; 
        height: 190px; 
        object-fit: cover; 
        margin-bottom: 20px; 
    }

    /* Text Elements */
    .card h3 { 
        font-size: 16px; 
        font-weight: 700; 
        margin: 10px 0; 
        height: 2.5em; 
        overflow: hidden; 
        line-height: 1.3;
    }
    .card h3 a { color: #333; text-decoration: none; }
    
    .card p { font-size: 13px; margin: 5px 0; color: #333; }
    .price-tag { font-weight: 700; margin: 15px 0 !important; font-size: 14px; }
    
    .desc { 
        font-size: 13px; 
        color: #666; 
        line-height: 1.6; 
        height: 4.8em; 
        overflow: hidden; 
        margin-top: auto; /* Pushes description to the bottom */
    }

    footer { padding: 40px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; margin-top: 50px; }
  </style>
</head>
<body>

  <header>
    <a href="MILESTONE2BookSearchPage.html">Home</a>
    <a href="MILESTONE2BookShelf.html">My Bookshelf</a>
  </header>

  <main>
    <div class="search-section">
        <h1>Book Search List</h1>
        <div class="search-container">
            <input type="text" id="searchTerm" placeholder="Search for books...">
            <button id="searchBtn">SEARCH</button>
        </div>
    </div>

    <div class="grid" id="resultsGrid">
        </div>
  </main>

  <footer>
      Disclaimer: This is a student website created for courses. 
      <br> Visit the <a href="https://www.kennesaw.edu/ccse/" target="_blank">CCSE Website</a>.
  </footer>

  <script>
    $(document).ready(function() {
      // Your Volume IDs
      const volumeIds = ["8VnJLu3AvvQC", "pTr44Sx6oWQC", "JVEc0QEACAAJ", "qhQAywOYz10C", "L-U3AAAACAAJ"];
      const myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";
      const $grid = $("#resultsGrid");

      function loadShelf() {
        $grid.empty();
        
        // Loop through each ID and fetch data
        volumeIds.forEach(id => {
          $.get(`https://www.googleapis.com/books/v1/volumes/${id}?key=${myKey}`, function(book) {
            const v = book.volumeInfo;
            const s = book.saleInfo;
            
            // Image handling
            const img = v.imageLinks ? v.imageLinks.smallThumbnail.replace("http://", "https://") : 'https://via.placeholder.com/130x190';
            
            // Price handling
            let priceText = "Price: N/A";
            if (s && s.listPrice) {
                priceText = "Price: $" + s.listPrice.amount.toFixed(2);
            }

            // Create Card Template
            const card = $(`
              <div class="card">
                <img src="${img}" alt="Book Cover">
                <h3><a href="details.html?id=${book.id}">${v.title || 'Untitled'}</a></h3>
                <p><b>By:</b> ${v.authors ? v.authors[0] : 'N/A'}</p>
                <p><b>Publisher:</b> ${v.publisher || 'N/A'}</p>
                <p class="price-tag">${priceText}</p>
                <p class="desc">${v.description ? v.description.substring(0, 110) + '...' : 'No description available.'}</p>
              </div>
            `);
            
            $grid.append(card);
          });
        });
      }

      loadShelf();
    });
  </script>

</body>
</html>
