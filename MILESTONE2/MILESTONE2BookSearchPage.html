<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">                                        
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Search | Milestone 2
  </title>                            
  <link rel="preconnect" href="https://fonts.googleapis.com">         
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">                         
  <style>                                                            
    .search-container { text-align: center; margin: 40px auto; max-width: 700px; display: flex; justify-content: center; align-items: flex-end; }
    #searchTerm { padding: 12px; width: 70%; border: none; border-bottom: 1px solid #333; background: transparent; font-size: 16px; outline: none; font-family: 'Inter'; } 
    #searchBtn { padding: 10px 25px; background: #333; color: white; border: none; cursor: pointer; font-size: 14px; font-weight: bold; margin-left: 10px; font-family: 'Inter'; } /* Black button */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 20px; } /* 3 column grid */
    
    /* This style ensures the title is perfectly centered over the 3-column book grid */
    .main-title { grid-column: 1 / -1; text-align: center; margin-bottom: 0; margin-top: 20px; }

    .card { background: white; padding: 20px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; } /* Card box */
    .card img { border: 1px solid #333; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } /* Book cover style */
    .card h3 { font-size: 1em; margin: 15px 0 5px 0; height: 2.4em; overflow: hidden; } /* Title style */
    .card h3 a { color: #333; text-decoration: none; }                   /* Title link color */
    .desc { font-size: 0.85em; color: #666; height: 3.6em; overflow: hidden; margin-bottom: 15px; line-height: 1.4; } /* Snippet style */
    #pagination { text-align: center; margin: 40px 0; }                 /* Page buttons area */
    #pageSelect { padding: 8px 15px; font-family: 'Inter'; border: 1px solid #333; background: white; cursor: pointer; } /* Dropdown style */
    .error-msg { color: #d93025; background: #fde8e8; padding: 15px; text-align: center; grid-column: 1/-1; border: 1px solid #f5c6cb; } /* Error style */
  </style>                                                          
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>   
</head>
  

<body>                         
  <header>                      
    <a href="MILESTONE2BookSearchPage.html">Home</a> 
    <a href="MILESTONE2BookShelf.html">My Bookshelf</a>    
  </header>                                                         
  <main>                                                    
    <div class="grid">
       <h1 class="main-title">My Bookshelf</h1>
    </div>

    <div class="search-container">                                    
      <input type="text" id="searchTerm" placeholder="Search by keyword or title"> 
      <button id="searchBtn">SEARCH
      </button>                           
    </div>                                                               
    
    <div class="grid" id="resultsGrid">
      </div>                          
    
    <div id="pagination">
      </div>                
  </main>                                     
  
  <footer>                                    
    <div class="footer-left">                 
        Disclaimer: This is a student website created for course projects in IT 4403. 
      <br> Visit the <a href="https://www.kennesaw.edu/ccse/academics/information-technology/" target="_blank">CCSE Website</a>.
    </div>                      
  </footer>                                     

  <script>                                                              
  $(document).ready(function() {                                        
    var myKey = "AIzaSyBu_4vbTfN8fWyFkHPgvlphVEZ0KJdkEtc";              
    var query = "";                                                     
    var currentPage = 1;                                                

    $("#searchBtn").on("click", function() {                            
      query = $("#searchTerm").val().trim();                            
      if (!query) return;                                               
      currentPage = 1;                                                  
      runSearch();                                                      
    });

    function runSearch() {                                              
      var startIndex = (currentPage - 1) * 20;                          
      var url = "https://www.googleapis.com/books/v1/volumes?q=" + encodeURIComponent(query) + 
                "&maxResults=20&startIndex=" + startIndex + "&key=" + myKey; 

      $("#resultsGrid").html("<p style='grid-column: 1/-1; text-align:center;'>Searching...</p>"); 

      $.get(url, function(data) {                                       
        $("#resultsGrid").empty();                                      
        var items = data.items || [];                                   

        if (items.length === 0) {                                       
            $("#resultsGrid").html("<p class='error-msg'>No books found.</p>"); 
            return;                                                     
        }

        items.forEach(function(book) {                                  
          var v = book.volumeInfo;                                      
          var img = v.imageLinks ? v.imageLinks.smallThumbnail : 'https://via.placeholder.com/120x160'; 
          img = img.replace("http://", "https://");                     

          var card = $("<div class='card'></div>");                     
          card.append("<img src='" + img + "' alt='Book'>");            
          card.append("<h3><a href='details.html?id=" + book.id + "'>" + (v.title || 'Untitled') + "</a></h3>"); 
          card.append("<p style='font-size:0.85em;'><b>By:</b> " + (v.authors ? v.authors[0] : 'N/A') + "</p>"); 
          
          var dText = v.description || 'No description.';               
          if (dText.length > 90) dText = dText.substring(0, 90) + "..."; 
          card.append("<p class='desc'>" + dText + "</p>");             

          $("#resultsGrid").append(card);                               
        });                                                             

        renderPagination(data.totalItems);                              
      });
    }

    function renderPagination(total) {                                  
      $("#pagination").empty();                                         
      var pages = Math.ceil(Math.min(total, 60) / 20);                  
      
      if (pages <= 1) return;                                           

      var label = $("<label for='pageSelect' style='margin-right:10px;'>Page: </label>");
      var select = $("<select id='pageSelect'></select>");              

      for (var i = 1; i <= pages; i++) {                                
        var option = $("<option value='" + i + "'>Page " + i + "</option>"); 
        if (i === currentPage) option.attr("selected", "selected");     
        select.append(option);                                          
      }

      select.on("change", function() {                                  
        currentPage = parseInt($(this).val());
        runSearch();
        window.scrollTo(0, 0);
      });

      $("#pagination").append(label).append(select);                    
    }
  });                                                                   
  </script>                                                             
</body>
</html>
