<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather JSON Display</title>


  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"> 

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif; /* use Inter font */
      display: flex; /* flex layout */
      flex-direction: column; /* stack vertically */
      align-items: center; /* center horizontally */
      padding: 20px; /* page padding */
      background-color: #f8f8f8; /* light background */
    }

    h1 {
      margin-bottom: 20px; /* space below title */
    }

    .weather-container {
      width: 100%; /* full width */
      max-width: 600px; /* max width */
      background-color: #fff; /* white card */
      padding: 20px; /* inner padding */
      border-radius: 8px; /* rounded corners */
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* subtle shadow */
    }

    .field {
      margin-bottom: 12px; /* space between fields */
    }

    .label {
      font-weight: 600; /* bold label */
      margin-right: 5px; /* gap after label */
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script> <!-- load jQuery -->
</head>
<body>

<h1>Weather JSON</h1> 

<div class="weather-container"> 
  <div class="field"><span class="label">Location:</span><span id="city"></span></div>
  <div class="field"><span class="label">Condition:</span><span id="condition"></span></div>
  <div class="field"><span class="label">Temperature:</span><span id="temperature"></span></div>
  <div class="field"><span class="label">Humidity:</span><span id="humidity"></span></div>
  <div class="field"><span class="label">Wind Speed:</span><span id="wind"></span></div>
  <div class="field"><span class="label">Cloudiness:</span><span id="clouds"></span></div>
</div>

<script>
var jsonObject = {
  "coord":{"lon":-0.13,"lat":51.51},
  "weather":[{"id":500,"main":"Rain","description":"light rain","icon":"10d"}],
  "base":"cmc stations",
  "main":{"temp":288.26,"pressure":1026,"humidity":59,"temp_min":286.95,"temp_max":289.26},
  "wind":{"speed":3.6,"deg":90},
  "clouds":{"all":75},
  "dt":1441734773,
  "sys":{"type":1,"id":5091,"message":0.0165,"country":"GB","sunrise":1441689887,"sunset":1441737016},
  "id":2643743,
  "name":"London",
  "cod":200
};

$(document).ready(function() {
    $("#city").text(jsonObject.name); // show city
    $("#condition").text(jsonObject.weather[0].description); // show weather condition
    var tempC = (jsonObject.main.temp - 273.15).toFixed(1);
    var tempF = ((jsonObject.main.temp - 273.15) * 9/5 + 32).toFixed(1);
    $("#temperature").text(tempC + "°C / " + tempF + "°F"); // show both
    $("#humidity").text(jsonObject.main.humidity + "%"); // show humidity
    $("#wind").text(jsonObject.wind.speed + " m/s"); // show wind speed
    $("#clouds").text(jsonObject.clouds.all + "%"); // show cloudiness


});
</script>

</body>
</html>
