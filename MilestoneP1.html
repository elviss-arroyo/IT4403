<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book List</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style> /* CSS start */
    body { font-family: 'Inter', Arial, sans-serif; padding: 20px; background: #f8f8f8; } /* body style */
    h1 { text-align: center; } /* center title */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; } /* 3 column grid */
    .card { background: white; padding: 10px; border-radius: 6px; text-align: center; min-height: 260px; display: flex; flex-direction: column; justify-content: space-between; } /* card styling */
    .card img { border: 2px solid #000; border-radius: 4px; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } /* image style */
    .links a { display: block; margin: 3px 0; } /* links spacing */
    .desc { font-size: 0.9em; } /* description style */
    .card p { 
    margin: 2px 0;
    line-height: 1.2;
    }
  </style> 
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head> 

<body> 
  <h1>Book Search List</h1>

  <div class="grid" id="grid"></div> 

<script>



$(document).ready(function() {  
   $.getJSON("google-books-search.json", function(json) {

  $("#grid").empty();  

  var items = json.items || [];  

  for (var i = 0; i < 10; i++) {  
    var card = $("<div class='card'></div>"); /* create card */

    if (items[i]) {  
      var v = items[i].volumeInfo; 

      var img = v.imageLinks ? v.imageLinks.smallThumbnail : 'https://via.placeholder.com/120x160'; /* image or placeholder */

      card.append("<img src='" + img + "' alt='Book'>"); /* image */
      card.append("<h3>" + (v.title || '') + "</h3>");
      card.append("<p><b>Author:</b> " + (v.authors ? v.authors.join(', ') : '') + "</p>"); /* authors */
      card.append("<p><b>Publisher:</b> " + (v.publisher || '') + "</p>"); /* publisher */
      card.append("<p><b>Pages:</b> " + (v.pageCount || 'N/A') + "</p>"); /* pages */
      card.append("<p><b>Published:</b> " + (v.publishedDate || '') + "</p>"); /* publish date */
      var desc = v.description || ''; /* description */
      if (desc.length > 120) { desc = desc.substring(0, 120) + "..."; } /* shorten description */
      card.append("<p class='desc'>" + desc + "</p>"); /* description */
      card.append("<div class='links'>" + /* links */
        "<a href='" + (v.previewLink || '#') + "' target='_blank'>Preview</a>" + /* preview */
        "<a href='" + (v.infoLink || '#') + "' target='_blank'>Info Link</a>" + /* info */
      "</div>"); /* end links */
    } else { /* if no item */
      card.append("<div>No Data</div>"); /* placeholder */
    }

    $("#grid").append(card);
  }

}); 

</script> 

</body> 
</html>
