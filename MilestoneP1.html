<!DOCTYPE html> <!-- document type -->
<html lang="en"> <!-- html language -->
<head> <!-- head section -->
  <meta charset="UTF-8"> <!-- character set -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->
  <title>Book Search List</title> <!-- page title -->

  <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- preconnect fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- font loading -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"> <!-- font link -->

  <style> /* CSS start */
    body { font-family: 'Inter', Arial, sans-serif; padding: 20px; background: #f8f8f8; } /* body style */
    h1 { text-align: center; } /* center title */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; } /* 3 column grid */
    .card { background: white; padding: 10px; border-radius: 6px; text-align: center; min-height: 260px; display: flex; flex-direction: column; justify-content: space-between; } /* card styling */
    .card img { border: 2px solid #000; border-radius: 4px; width: 120px; height: 160px; object-fit: cover; margin: 0 auto; } /* image style */
    .links a { display: block; margin: 3px 0; } /* links spacing */
    .desc { font-size: 0.9em; } /* description style */
    .card p {  /* card paragraph */
    margin: 2px 0; /* margin */
    line-height: 1.2; /* line height */
    }
  </style> <!-- end style -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script> <!-- jquery -->
</head> <!-- end head -->

<body> <!-- body start -->
  <h1>Book Search List</h1> <!-- heading -->

  <div class="grid" id="grid"></div> <!-- grid container -->
<script> 
$(document).ready(function() {  /* document ready */
    $.getJSON("google-books-search.json", function(json) { /* get json */
        $("#grid").empty();  /* clear grid */
        var items = json.items || [];  /* items array */
        for (var i = 0; i < 10; i++) {  /* loop 10 */
            var card = $("<div class='card'></div>"); /* create card */
            if (items[i]) {  /* if item exists */
                var v = items[i].volumeInfo; /* volume info */
                var img = v.imageLinks ? v.imageLinks.smallThumbnail : 'https://via.placeholder.com/120x160'; /* image */
                card.append("<img src='" + img + "' alt='Book'>"); /* image element */
                card.append("<h3>" + (v.title || '') + "</h3>"); /* title */
                card.append("<p><b>Author:</b> " + (v.authors ? v.authors.join(', ') : '') + "</p>"); /* author */
                card.append("<p><b>Publisher:</b> " + (v.publisher || '') + "</p>"); /* publisher */
                card.append("<p><b>Pages:</b> " + (v.pageCount || 'N/A') + "</p>"); /* pages */
                card.append("<p><b>Published:</b> " + (v.publishedDate || '') + "</p>"); /* published */
                var desc = v.description || ''; /* description */
                if (desc.length > 120) { desc = desc.substring(0, 120) + "..."; } /* trim desc */
                card.append("<p class='desc'>" + desc + "</p>"); /* description element */
                card.append("<div class='links'>" +  /* links container */
                    "<a href='" + (v.previewLink || '#') + "' target='_blank'>Preview</a>" +  /* preview */
                    "<a href='" + (v.infoLink || '#') + "' target='_blank'>Info Link</a>" +  /* info */
                "</div>"); /* end links */
            } else { /* no data */
                card.append("<div>No Data</div>"); /* no data message */
            }

            $("#grid").append(card); /* append card */
        }
    });
}); /* end document ready */
</script> <!-- end script -->

</body> <!-- end body -->
</html> <!-- end html -->
