<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background-color: #f8f8f8; }
        h1 { text-align: center; }
        .search-area { text-align: center; margin-bottom: 20px; }
        #searchTerm { padding: 10px; width: 300px; border-radius: 4px; border: 1px solid #ddd; }
        #searchBtn { padding: 10px 20px; border-radius: 4px; border: none; background-color: #007bff; color: white; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 120px; height: 160px; border: 1px solid #333; margin-bottom: 10px; }
        .card h3 { font-size: 1rem; margin: 10px 0; }
        
        #pagination { text-align: center; margin-top: 20px; }
        .page-btn { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .active { font-weight: bold; background-color: #ddd; }
    </style>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <h1>Book Search</h1>

    <div class="search-area">
        <input type="text" id="searchTerm" placeholder="Search...">
        <button id="searchBtn">Search</button>
    </div>

    <div class="grid" id="bookGrid"></div>
    <div id="pagination"></div>

    <script>
   
        $(function () {
            console.log("DOM Ready");

      
            $("#searchBtn").on("click", function () {
                runSearch(1); 
            });

            // Enter key support
            $("#searchTerm").on("keydown", function (e) {
                if (e.which === 13) {
                    runSearch(1);
                }
            });
        });

        function runSearch(page) {
            const query = $("#searchTerm").val().trim();
            if (!query) return;

            const startIndex = (page - 1) * 20;
            const url = "https://www.googleapis.com/books/v1/volumes?q=" + encodeURIComponent(query) + "&maxResults=20&startIndex=" + startIndex;

            $("#bookGrid").html("<p>Loading...</p>");

            $.getJSON(url, function (data) {
                $("#bookGrid").empty();
                if (!data.items) return;

                data.items.forEach(function (book) {
                    const v = book.volumeInfo;
                    
       
                    const img = (v.imageLinks && v.imageLinks.thumbnail) 
                                ? v.imageLinks.thumbnail 
                                : "https://via.placeholder.com/120x160?text=No+Cover";

                    const cardHTML = `
                        <div class="card">
                            <img src="${img}">
                            <h3><a href="details.html?id=${book.id}">${v.title || 'No Title'}</a></h3>
                            <p>Author: ${v.authors ? v.authors[0] : 'N/A'}</p>
                        </div>
                    `;
                    $("#bookGrid").append(cardHTML);
                });

                createPagination(data.totalItems, page);
            });
        }

        function createPagination(totalItems, currentPage) {
            $("#pagination").empty();
            const maxPages = Math.ceil(Math.min(totalItems, 60) / 20);

            for (let i = 1; i <= maxPages; i++) {
                const btn = $("<button class='page-btn'>" + i + "</button>");
                if (i === currentPage) btn.addClass("active");

                btn.on("click", function () {
                    runSearch(i);
                });
                $("#pagination").append(btn);
            }
        }
    </script>
</body>
</html>
