<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Book Search</title> 
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"> 

  <style>
    body { font-family: 'Inter', Arial; padding: 20px; background: #f8f8f8; } 
    h1 { text-align: center; } 
    .search-box { text-align: center; margin-bottom: 15px; } 
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 1000px; margin: auto; } 
    .card { background: white; padding: 10px; border-radius: 6px; text-align: center; min-height: 260px; border: 1px solid #ddd; } 
    .card img { width: 120px; height: 160px; border: 2px solid black; margin: auto; display: block; } 
    .desc { font-size: 0.9em; color: #555; } 
    #pagination { text-align: center; margin-top: 15px; } 
    button { margin: 3px; padding: 5px 10px; cursor: pointer; } 
  </style>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script> 
</head> 

<body> 

<h1>Book Search</h1> 

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search books..."> 
  <button id="searchBtn">Search</button> 
</div>

<div class="grid" id="grid"></div> 
<div id="pagination"></div> 

<script> 
let currentPage = 1; 
let query = ""; 

$(document).ready(function() {
  $("#searchBtn").click(function() {
    query = $("#searchInput").val(); 
    currentPage = 1; 
    searchBooks(); 
  });

  
  $("#searchInput").keypress(function(e) {
    if(e.which == 13) {
      $("#searchBtn").click();
    }
  });
});

function searchBooks() {
  if (!query) return; 

  let startIndex = (currentPage - 1) * 20; 
  let url = "https://www.googleapis.com/books/v1/volumes?q=" 
        + encodeURIComponent(query) + "&maxResults=20&startIndex=" + startIndex;
  
  $.getJSON(url, function(data) { 
    $("#grid").empty(); 
    let items = data.items || []; 
    
    items.forEach(function(book) {
      let v = book.volumeInfo; 
      let card = $("<div class='card'></div>"); 
      let img = v.imageLinks ? v.imageLinks.smallThumbnail : "https://via.placeholder.com/120x160";
      
      card.append("<img src='" + img + "'>"); 
      card.append("<h3><a href='details.html?id=" + book.id + "'>" + (v.title || "No Title") + "</a></h3>"); 
      card.append("<p><b>Author:</b> " + (v.authors ? v.authors.join(", ") : "N/A") + "</p>");    
      card.append("<p><b>Publisher:</b> " + (v.publisher || "N/A") + "</p>");  
      
      let desc = v.description || "No description available."; 
      if (desc.length > 100) desc = desc.substring(0, 100) + "..."; 
      card.append("<p class='desc'>" + desc + "</p>"); 

      $("#grid").append(card); 
    });
    
    createPagination(data.totalItems); 
  });
}

function createPagination(totalItems) {
  $("#pagination").empty(); 
  if (!totalItems || totalItems === 0) return; 

  let totalPages = Math.ceil(Math.min(totalItems, 60) / 20); 
  for (let i = 1; i <= totalPages; i++) {
    let btn = $("<button>" + i + "</button>"); 
    if (i === currentPage) btn.css("font-weight", "bold"); 
    
    btn.click(function() {
      currentPage = i; 
      searchBooks();   
    });
    $("#pagination").append(btn); 
  }
}
</script>

</body> 
</html>
